services:
  postgres:
    image: postgres:16-alpine
    container_name: tickets_inventory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: tickets_password
      POSTGRES_DB: tickets_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
